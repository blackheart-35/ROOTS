<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roots - Grow Your Knowledge</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        /* Screen 1 Specific Styles */
        body { overflow: hidden; } /* No scroll on login */
        
        .login-bg {
            position: fixed; inset: 0; z-index: -3;
            background: var(--login-canvas);
        }

        /* Cosmic + forest atmosphere layers */
        .login-blob {
            position: fixed; inset: -10%; z-index: -2;
            pointer-events: none;
        }
        .blob-1 {
            background: radial-gradient(ellipse 700px 500px at 30% 20%, rgba(139,92,246,0.12) 0%, transparent 65%);
            animation: cosmicDriftX 12s ease-in-out infinite;
        }
        .blob-2 {
            background: radial-gradient(ellipse 500px 400px at 70% 80%, rgba(59,130,246,0.08) 0%, transparent 65%);
            animation: cosmicDriftXReverse 18s ease-in-out infinite;
        }
        .blob-3 {
            background: radial-gradient(ellipse 300px 300px at 50% 88%, rgba(26,255,140,0.06) 0%, transparent 65%);
            animation: breatheSoft 5s ease-in-out infinite;
        }
        
        .glow-bloom {
            position: fixed; top: 60%; left: 50%; transform: translate(-50%, -50%);
            width: 1200px; height: 800px; border-radius: 50%;
            background: radial-gradient(ellipse 600px 400px at 50% 60%, rgba(26,255,140,0.07) 0%, transparent 70%);
            z-index: -2;
            animation: breatheGlow 5s ease-in-out infinite;
        }
        @keyframes breatheGlow { 0%, 100% { opacity: 0.7; } 50% { opacity: 1.1; } }

        /* Animated Roots */
        .root-bg-svg {
            position: fixed; bottom: 0; z-index: -2;
            width: 400px; height: 40vh; pointer-events: none;
            filter: drop-shadow(0 0 4px rgba(26,255,140,0.6));
            opacity: 0.14;
        }
        .root-left { left: 0; }
        .root-right { right: 0; }
        .root-path {
            fill: none; stroke: var(--accent-primary); stroke-width: 1.5;
            stroke-linecap: round; stroke-linejoin: round;
            stroke-dasharray: 1000; stroke-dashoffset: 1000;
            animation: drawRoot 2.5s ease-in-out forwards, pulseRoot 6s ease-in-out infinite 2.5s;
        }

        @keyframes drawRoot { to { stroke-dashoffset: 0; } }
        @keyframes pulseRoot { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

        /* Login Card */
        .login-card-wrapper {
            position: relative; width: 100vw; height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .login-card {
            width: 420px; padding: 36px; border-radius: 20px;
            background: rgba(255,255,255,0.05); -webkit-backdrop-filter: blur(32px) saturate(200%); backdrop-filter: blur(32px) saturate(200%);
            border: 1px solid rgba(139,92,246,0.30);
            box-shadow: 0 8px 64px rgba(0,0,0,0.7), 0 0 40px rgba(139,92,246,0.10), inset 0 1px 0 rgba(255,255,255,0.10);
            animation: entranceFadeUp 0.7s ease-out 0.15s both;
            position: relative; overflow: hidden; transition: all 0.4s;
        }
        .login-card::after {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 22px;
            background: conic-gradient(from 180deg, rgba(139,92,246,0.0), rgba(139,92,246,0.16), rgba(59,130,246,0.10), rgba(139,92,246,0.0));
            opacity: 0.12;
            animation: borderOrbit 6s linear infinite;
            pointer-events: none;
            mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
            -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            padding: 1px;
        }
        .shimmer-sweep {
            position: absolute; inset: 0; pointer-events: none; opacity: 0;
            box-shadow: inset 0 0 15px rgba(26,255,140,0.5);
            transition: opacity 0.4s ease;
        }

        /* Top Section */
        .card-header { display: flex; flex-direction: column; align-items: center; margin-bottom: 20px; }
        .logo-icon {
            width: 38px; height: 38px; stroke: var(--accent-primary); stroke-width: 2px;
            filter: drop-shadow(0 0 8px rgba(26,255,140,0.6)); fill: none;
            animation: pulseIcon 3s ease-in-out infinite; margin-bottom: 8px;
        }
        @keyframes pulseIcon { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.04); } }
        .wordmark { font-family: var(--font-inter); font-weight: 800; font-size: 28px; color: white; letter-spacing: -0.5px; margin-bottom: 6px; }
        .subtitle { font-family: var(--font-inter); font-weight: 400; font-size: 13px; color: rgba(255,255,255,0.38); letter-spacing: 0.3px; }

        /* Tab Switcher */
        .tab-switcher {
            width: 100%; height: 44px; background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08); border-radius: 12px;
            padding: 4px; display: flex; position: relative; margin-bottom: 20px;
        }
        .tab-btn {
            flex: 1; z-index: 2; color: rgba(255,255,255,0.38); font-size: 14px;
            font-family: var(--font-inter); transition: color 0.2s;
        }
        .tab-btn.active { color: #a78bfa; font-weight: 600; }
        .tab-btn:hover:not(.active) { color: rgba(255,255,255,0.6); }
        .tab-indicator {
            position: absolute; top: 4px; bottom: 4px; left: 4px; width: calc(50% - 4px);
            background: rgba(139,92,246,0.20); border: 1px solid rgba(139,92,246,0.40);
            border-radius: 9px; transition: transform 0.25s ease-out; z-index: 1;
        }

        /* Forms */
        .form-container { display: flex; flex-direction: column; gap: 14px; margin-bottom: 22px; }
        .forgot-link {
            align-self: flex-end; font-size: 12px; color: rgba(139,92,246,0.65);
            margin-top: -6px; cursor: pointer;
        }
        .forgot-link:hover { color: #a78bfa; text-decoration: underline; }

        /* Password Strength */
        .pwd-strength { height: 4px; border-radius: 2px; width: 100%; background: rgba(255,255,255,0.07); margin-top: -6px; overflow: hidden; display: none; }
        .pwd-bar { height: 100%; width: 0%; background: var(--accent-danger); transition: width 0.3s, background 0.3s; }

        /* Social Divider */
        .social-divider {
            display: flex; align-items: center; gap: 12px; margin-bottom: 12px;
            font-size: 12px; color: rgba(255,255,255,0.22); margin-top: 18px;
        }
        .social-divider::before, .social-divider::after {
            content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.08);
        }

        /* Social Buttons */
        .social-group { display: flex; gap: 10px; }
        .btn-social {
            flex: 1; height: 46px; border-radius: 11px;
            background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.7); font-size: 13px; font-weight: 500;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: all 0.18s ease; cursor: pointer;
        }
        .btn-social:hover {
            border-color: rgba(26,255,140,0.3); background: rgba(255,255,255,0.07);
            transform: translateY(-1px); color: white;
        }

        /* Loading */
        .loader {
            display: none; align-items: center; justify-content: center; gap: 4px;
        }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: #050a08; animation: bounce 0.6s infinite alternate; }
        .dot:nth-child(2) { animation-delay: 0.15s; }
        .dot:nth-child(3) { animation-delay: 0.3s; }
        @keyframes bounce { to { transform: translateY(-4px); } }

        /* Footer */
        .card-footer {
            margin-top: 18px; font-size: 14px; color: rgba(255,255,255,0.3);
            text-align: center; font-family: var(--font-inter);
            animation: entranceFadeUp 0.6s ease-out 0.4s both;
        }
        .footer-link {
            color: var(--accent-primary); font-weight: 500; cursor: pointer; transition: all 0.2s;
        }
        .footer-link:hover { text-decoration: underline; }
    </style>
</head>
<body class="login-focus">
    <div class="login-bg"></div>
    <div class="login-blob blob-1"></div>
    <div class="login-blob blob-2"></div>
    <div class="login-blob blob-3"></div>
    <div class="noise-overlay"></div>
    <div class="glow-bloom"></div>
    
    <!-- Render 20 Particles -->
    <div id="particles-container"></div>

    <!-- Animated Root SVGs -->
    <svg class="root-bg-svg root-left" viewBox="0 0 200 400" preserveAspectRatio="none">
        <path class="root-path" d="M 0 400 Q 50 350, 40 300 T 80 200 Q 120 150, 100 100 T 150 50" />
        <path class="root-path" d="M 40 300 Q 80 320, 100 280 T 140 250" />
        <path class="root-path" d="M 80 200 Q 30 180, 50 120" />
    </svg>
    <svg class="root-bg-svg root-right" viewBox="0 0 200 400" preserveAspectRatio="none">
        <path class="root-path" d="M 200 400 Q 150 360, 160 310 T 120 220 Q 80 180, 100 120 T 50 80" />
        <path class="root-path" d="M 160 310 Q 120 330, 100 290 T 60 260" />
    </svg>

    <div class="login-card-wrapper">
        <div class="login-card" id="loginCard">
            <div class="shimmer-sweep" id="shimmer"></div>
            
            <div class="card-header">
                <!-- Custom Tree Line Art Icon -->
                <svg class="logo-icon" viewBox="0 0 24 24">
                    <path d="M12 22 L12 8 M12 12 Q7 9 5 4 M12 14 Q17 10 19 6 M12 22 Q9 20 8 24 M12 22 Q15 20 16 24" stroke-linecap="round"/>
                </svg>
                <div class="wordmark">Roots</div>
                <div class="subtitle">Grow your knowledge.</div>
            </div>

            <div class="tab-switcher" id="tabSwitcher">
                <div class="tab-indicator" id="tabIndicator"></div>
                <button class="tab-btn active" onclick="switchTab('signin')">Sign In</button>
                <button class="tab-btn" onclick="switchTab('signup')">Sign Up</button>
            </div>

            <div class="form-container" id="formContainer">
                <div class="input-group field signup-only" style="display: none;">
                    <i class="ph ph-user input-icon"></i>
                    <label class="float-label">Full name</label>
                    <input type="text" class="form-input" placeholder="Full name" onfocus="triggerShimmer()">
                </div>
                <div class="input-group field">
                    <i class="ph ph-envelope-simple input-icon"></i>
                    <label class="float-label">Email address</label>
                    <input type="email" class="form-input" placeholder="Email address" onfocus="triggerShimmer()">
                </div>
                <div class="input-group field">
                    <i class="ph ph-lock-key input-icon"></i>
                    <label class="float-label" id="pwdLabel">Password</label>
                    <input type="password" class="form-input" placeholder="Password" id="pwdInput" oninput="checkStrength(this.value)" onfocus="triggerShimmer()">
                    <i class="ph ph-eye input-icon-right" onclick="togglePwd()"></i>
                </div>
                <div class="pwd-strength signup-only" id="pwdStrengthCon">
                    <div class="pwd-bar" id="pwdBar"></div>
                </div>
                <div class="forgot-link signin-only">Forgot Password?</div>
            </div>

            <button class="btn-primary cosmic" id="ctaBtn" onclick="handleLogin()">
                <span id="btnText">Enter the Forest &rarr;</span>
                <div class="loader" id="btnLoader">
                    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                </div>
            </button>

            <div class="social-divider">or continue with</div>
            <div class="social-group">
                <button class="btn-social">
                    <i class="ph ph-google-logo" style="color: #4285F4; font-size: 18px;"></i>
                    Google
                </button>
                <button class="btn-social">
                    <i class="ph-fill ph-github-logo" style="font-size: 18px;"></i>
                    GitHub
                </button>
            </div>
        </div>
        
        <div class="card-footer" id="footerText">
            Don't have an account? <span class="footer-link" onclick="switchTab('signup')">Sign Up</span>
        </div>
    </div>

    <script>
        // Floating label behavior
        document.querySelectorAll('.field').forEach((field) => {
            const input = field.querySelector('input');
            if (!input) return;
            const sync = () => field.classList.toggle('filled', (input.value || '').trim().length > 0);
            input.addEventListener('focus', () => field.classList.add('focused'));
            input.addEventListener('blur', () => field.classList.remove('focused'));
            input.addEventListener('input', sync);
            sync();
        });

        // Particle Generation
        const container = document.getElementById('particles-container');
        for (let i = 0; i < 24; i++) {
            let p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.bottom = '-10px';
            p.style.setProperty('--max-opacity', (Math.random() * 0.2 + 0.15).toFixed(2));
            p.style.setProperty('--drift-x', (Math.random() * 60 - 30) + 'px');
            p.style.animationDuration = (Math.random() * 5 + 5) + 's';
            p.style.animationDelay = (Math.random() * 6) + 's';
            // Mix cosmic dust + forest spores on login
            p.style.background = Math.random() > 0.6 ? 'rgba(139,92,246,0.5)' : '#1aff8c';
            container.appendChild(p);
        }

        // Tab Switching Logic
        let mode = 'signin';
        function switchTab(newMode) {
            if(mode === newMode) return;
            mode = newMode;
            
            const tabIndicator = document.getElementById('tabIndicator');
            const btns = document.querySelectorAll('.tab-btn');
            
            if(mode === 'signup') {
                tabIndicator.style.transform = 'translateX(100%)';
                btns[0].classList.remove('active');
                btns[1].classList.add('active');
                
                document.querySelectorAll('.signup-only').forEach(el => el.style.display = 'block');
                document.querySelectorAll('.signin-only').forEach(el => el.style.display = 'none');
                
                document.getElementById('pwdInput').placeholder = "Create a password";
                document.getElementById('pwdLabel').textContent = "Create a password";
                document.getElementById('btnText').innerHTML = "Plant Your Roots &rarr;";
                document.getElementById('footerText').innerHTML = `Already have an account? <span class="footer-link" onclick="switchTab('signin')">Sign In</span>`;
            } else {
                tabIndicator.style.transform = 'translateX(0)';
                btns[0].classList.add('active');
                btns[1].classList.remove('active');
                
                document.querySelectorAll('.signup-only').forEach(el => el.style.display = 'none');
                document.querySelectorAll('.signin-only').forEach(el => el.style.display = 'block');
                
                document.getElementById('pwdInput').placeholder = "Password";
                document.getElementById('pwdLabel').textContent = "Password";
                document.getElementById('btnText').innerHTML = "Enter the Forest &rarr;";
                document.getElementById('footerText').innerHTML = `Don't have an account? <span class="footer-link" onclick="switchTab('signup')">Sign Up</span>`;
            }
        }

        function triggerShimmer() {
            const shim = document.getElementById('shimmer');
            shim.style.opacity = '1';
            setTimeout(() => shim.style.opacity = '0', 400);
        }

        function togglePwd() {
            const input = document.getElementById('pwdInput');
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        function checkStrength(val) {
            const bar = document.getElementById('pwdBar');
            if (val.length === 0) { bar.style.width = '0'; return; }
            let s = 0;
            if (val.length > 5) s++;
            if (val.length > 8) s++;
            if (/[A-Z]/.test(val)) s++;
            if (/[0-9!@#$&*]/.test(val)) s++;
            
            let color = '#ff6b6b'; let width = '25%';
            if (s === 2) { color = '#ffb347'; width = '50%'; }
            else if (s === 3) { color = '#f1c40f'; width = '75%'; }
            else if (s >= 4) { color = '#1aff8c'; width = '100%'; }
            
            bar.style.width = width;
            bar.style.background = color;
        }

        function handleLogin() {
            const btn = document.getElementById('ctaBtn');
            const txt = document.getElementById('btnText');
            const load = document.getElementById('btnLoader');
            
            txt.style.display = 'none';
            load.style.display = 'flex';
            
            setTimeout(() => {
                window.location.href = 'tree.html';
            }, 1000);
        }
    </script>
</body>
</html>
